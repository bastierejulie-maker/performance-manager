<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rapport Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3a;
    --accent: #3b82f6;
    --accent2: #6366f1;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --text: #f0f0f5;
    --muted: #6b7280;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 24px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .season-selector {
    display: flex;
    gap: 8px;
  }

  .season-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    transition: all 0.2s;
  }

  .season-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* KPI Cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }

  .kpi-card:hover { transform: translateY(-2px); }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .kpi-card.blue::before { background: var(--accent); }
  .kpi-card.green::before { background: var(--green); }
  .kpi-card.yellow::before { background: var(--yellow); }
  .kpi-card.purple::before { background: var(--accent2); }
  .kpi-card.red::before { background: var(--red); }

  .kpi-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .kpi-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 2px;
    line-height: 1;
  }

  .kpi-card.blue .kpi-value { color: var(--accent); }
  .kpi-card.green .kpi-value { color: var(--green); }
  .kpi-card.yellow .kpi-value { color: var(--yellow); }
  .kpi-card.purple .kpi-value { color: var(--accent2); }
  .kpi-card.red .kpi-value { color: var(--red); }

  .kpi-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Charts */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 32px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }

  .chart-title {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 20px;
  }

  /* Match table */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .table-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    padding: 12px 16px;
    text-align: left;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: var(--surface2);
    font-weight: 500;
  }

  td {
    padding: 14px 16px;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
  }

  tr:last-child td { border-bottom: none; }

  tr:hover td { background: var(--surface2); }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
  }

  .badge-champ { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .badge-coupe { background: rgba(59,130,246,0.15); color: var(--accent); }
  .badge-amical { background: rgba(107,114,128,0.15); color: var(--muted); }

  .note-high { color: var(--green); font-weight: 600; }
  .note-mid { color: var(--yellow); font-weight: 600; }
  .note-low { color: var(--red); font-weight: 600; }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 16px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    color: var(--muted);
    font-size: 14px;
  }

  .error {
    text-align: center;
    padding: 40px;
    color: var(--red);
  }

  @media (max-width: 600px) {
    .charts-grid { grid-template-columns: 1fr; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <div class="loading-text">Chargement des données...</div>
</div>

<div id="app" style="display:none">
  <div class="header">
    <div class="title">RAPPORT STATS</div>
    <div class="season-selector" id="seasonSelector"></div>
  </div>

  <div class="kpi-grid" id="kpiGrid"></div>

  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">⏱️ Temps de jeu par match</div>
      <canvas id="chartTemps"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">⚽ Buts & Passes décisives</div>
      <canvas id="chartButs"></canvas>
    </div>
  </div>

  <div class="table-card">
    <div class="table-header">📋 Détail des matchs</div>
    <table>
      <thead>
        <tr>
          <th>Match</th>
          <th>Compétition</th>
          <th>⏱️</th>
          <th>⚽</th>
          <th>🎯</th>
          <th>📊 Note</th>
        </tr>
      </thead>
      <tbody id="matchTable"></tbody>
    </table>
  </div>
</div>

<script>
const API_KEY = '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';
const DB_ID = '34b69796db3f802e8bbddf8967d6b7b3';

let allMatches = [];
let currentSeason = null;
let chartTemps, chartButs;

async function fetchMatches() {
  try {
    const res = await fetch(`https://api.notion.com/v1/databases/${DB_ID}/query`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${API_KEY}`,
        'Notion-Version': '2022-06-28',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        sorts: [{ property: 'Date', direction: 'descending' }]
      })
    });

    if (!res.ok) throw new Error('API Error');
    const data = await res.json();
    return data.results;
  } catch (e) {
    console.error(e);
    return null;
  }
}

function getProp(page, name, type) {
  const props = page.properties;
  const keys = Object.keys(props);
  
  // Find property by partial name match
  const key = keys.find(k => k.toLowerCase().includes(name.toLowerCase())) || name;
  const prop = props[key];
  if (!prop) return null;

  switch(type) {
    case 'title': return prop.title?.[0]?.plain_text || '';
    case 'number': return prop.number ?? 0;
    case 'select': return prop.select?.name || '';
    case 'date': return prop.date?.start || '';
    case 'formula_string': return prop.formula?.string || '';
    case 'formula_number': return prop.formula?.number || 0;
    default: return null;
  }
}

function parseMatches(results) {
  return results.map(page => {
    const props = page.properties;
    const propKeys = Object.keys(props);
    
    const findProp = (keywords) => {
      for (const kw of keywords) {
        const k = propKeys.find(p => p.toLowerCase().includes(kw.toLowerCase()));
        if (k) return props[k];
      }
      return null;
    };

    const getNum = (keywords) => findProp(keywords)?.number ?? 0;
    const getSel = (keywords) => findProp(keywords)?.select?.name || '';
    const getTitle = () => {
      const t = propKeys.find(p => props[p].type === 'title');
      return t ? (props[t].title?.[0]?.plain_text || '') : '';
    };
    const getDate = (keywords) => findProp(keywords)?.date?.start || '';

    return {
      title: getTitle(),
      saison: getSel(['saison', 'season']),
      competition: getSel(['compétition', 'competition', 'compet']),
      date: getDate(['date']),
      temps: getNum(['temps', 'time', 'minutes', 'durée']),
      buts: getNum(['buts', 'but', 'goal']),
      passes: getNum(['passe', 'assist', 'décisive']),
      note: getNum(['note', 'rating']),
      tirs: getNum(['tir']),
      tirsCadrés: getNum(['cadré', 'cadre']),
      duelsGagnés: getNum(['duel']),
    };
  });
}

function getSeasons(matches) {
  const seasons = [...new Set(matches.map(m => m.saison).filter(Boolean))];
  return seasons.sort().reverse();
}

function filterBySeason(matches, season) {
  if (!season) return matches;
  return matches.filter(m => m.saison === season);
}

function renderKPIs(matches) {
  const total = matches.length;
  const totalMin = matches.reduce((s, m) => s + m.temps, 0);
  const totalButs = matches.reduce((s, m) => s + m.buts, 0);
  const totalPasses = matches.reduce((s, m) => s + m.passes, 0);
  const avgNote = total > 0 ? (matches.reduce((s, m) => s + m.note, 0) / total).toFixed(1) : 0;
  const avgTemps = total > 0 ? Math.round(totalMin / total) : 0;

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card blue">
      <div class="kpi-label">Matchs joués</div>
      <div class="kpi-value">${total}</div>
      <div class="kpi-sub">${totalMin} min total</div>
    </div>
    <div class="kpi-card green">
      <div class="kpi-label">Buts</div>
      <div class="kpi-value">${totalButs}</div>
      <div class="kpi-sub">1 but / ${totalButs > 0 ? Math.round(total/totalButs) : '—'} matchs</div>
    </div>
    <div class="kpi-card yellow">
      <div class="kpi-label">Passes déc.</div>
      <div class="kpi-value">${totalPasses}</div>
      <div class="kpi-sub">${(totalButs + totalPasses)} contributions</div>
    </div>
    <div class="kpi-card purple">
      <div class="kpi-label">Note moy.</div>
      <div class="kpi-value">${avgNote}</div>
      <div class="kpi-sub">/ 10</div>
    </div>
    <div class="kpi-card red">
      <div class="kpi-label">Moy. tps jeu</div>
      <div class="kpi-value">${avgTemps}'</div>
      <div class="kpi-sub">par match</div>
    </div>
  `;
}

function renderCharts(matches) {
  const reversed = [...matches].reverse().slice(-10);
  const labels = reversed.map(m => m.title.split('—')[0].trim() || m.title);

  // Chart temps de jeu
  if (chartTemps) chartTemps.destroy();
  chartTemps = new Chart(document.getElementById('chartTemps'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: reversed.map(m => m.temps),
        backgroundColor: 'rgba(59,130,246,0.6)',
        borderColor: 'rgba(59,130,246,1)',
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        y: { 
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#6b7280', font: { size: 10 } },
          max: 100
        },
        x: { 
          grid: { display: false },
          ticks: { color: '#6b7280', font: { size: 9 }, maxRotation: 45 }
        }
      }
    }
  });

  // Chart buts & passes
  if (chartButs) chartButs.destroy();
  chartButs = new Chart(document.getElementById('chartButs'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Buts',
          data: reversed.map(m => m.buts),
          backgroundColor: 'rgba(34,197,94,0.7)',
          borderRadius: 4,
        },
        {
          label: 'Passes',
          data: reversed.map(m => m.passes),
          backgroundColor: 'rgba(99,102,241,0.7)',
          borderRadius: 4,
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: { color: '#9ca3af', font: { size: 11 } }
        }
      },
      scales: {
        y: {
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#6b7280', font: { size: 10 } },
          stacked: false
        },
        x: {
          grid: { display: false },
          ticks: { color: '#6b7280', font: { size: 9 }, maxRotation: 45 }
        }
      }
    }
  });
}

function getNoteClass(note) {
  if (note >= 7) return 'note-high';
  if (note >= 5) return 'note-mid';
  return note > 0 ? 'note-low' : '';
}

function getCompBadge(comp) {
  const c = comp.toLowerCase();
  if (c.includes('champ')) return 'badge-champ';
  if (c.includes('coupe')) return 'badge-coupe';
  return 'badge-amical';
}

function renderTable(matches) {
  const tbody = document.getElementById('matchTable');
  if (matches.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:32px">Aucun match trouvé</td></tr>`;
    return;
  }
  tbody.innerHTML = matches.map(m => `
    <tr>
      <td style="font-weight:500">${m.title || '—'}</td>
      <td><span class="badge ${getCompBadge(m.competition)}">${m.competition || '—'}</span></td>
      <td>${m.temps > 0 ? m.temps + "'" : '—'}</td>
      <td>${m.buts > 0 ? '⚽ ' + m.buts : m.buts}</td>
      <td>${m.passes > 0 ? '🎯 ' + m.passes : m.passes}</td>
      <td class="${getNoteClass(m.note)}">${m.note > 0 ? m.note + '/10' : '—'}</td>
    </tr>
  `).join('');
}

function renderSeasons(seasons, active) {
  const container = document.getElementById('seasonSelector');
  container.innerHTML = seasons.map(s => `
    <button class="season-btn ${s === active ? 'active' : ''}" onclick="changeSeason('${s}')">${s}</button>
  `).join('');
}

function changeSeason(season) {
  currentSeason = season;
  const filtered = filterBySeason(allMatches, season);
  renderSeasons(getSeasons(allMatches), season);
  renderKPIs(filtered);
  renderCharts(filtered);
  renderTable(filtered);
}

async function init() {
  const results = await fetchMatches();

  document.getElementById('loading').style.display = 'none';

  if (!results) {
    document.getElementById('app').style.display = 'block';
    document.getElementById('app').innerHTML = `<div class="error">❌ Erreur de connexion à Notion.<br>Vérifiez que l'intégration est bien connectée à la page.</div>`;
    return;
  }

  allMatches = parseMatches(results);
  const seasons = getSeasons(allMatches);
  currentSeason = seasons[0] || null;

  document.getElementById('app').style.display = 'block';

  renderSeasons(seasons, currentSeason);
  const filtered = filterBySeason(allMatches, currentSeason);
  renderKPIs(filtered);
  renderCharts(filtered);
  renderTable(filtered);
}

init();
</script>
</body>
</html>
