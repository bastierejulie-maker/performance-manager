<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rapport Stats Match</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c28; --border: #2a2a3a;
    --accent: #3b82f6; --accent2: #6366f1; --green: #22c55e; --yellow: #eab308;
    --red: #ef4444; --text: #f0f0f5; --muted: #6b7280;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px; }
  .title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 3px; background: linear-gradient(135deg, #3b82f6, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; transition: all 0.2s; }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; position: relative; overflow: hidden; transition: transform 0.2s; }
  .kpi-card:hover { transform: translateY(-2px); }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .kpi-card.blue::before { background: var(--accent); } .kpi-card.green::before { background: var(--green); }
  .kpi-card.yellow::before { background: var(--yellow); } .kpi-card.purple::before { background: var(--accent2); }
  .kpi-card.orange::before { background: #f97316; }
  .kpi-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .kpi-value { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; line-height: 1; }
  .kpi-card.blue .kpi-value { color: var(--accent); } .kpi-card.green .kpi-value { color: var(--green); }
  .kpi-card.yellow .kpi-value { color: var(--yellow); } .kpi-card.purple .kpi-value { color: var(--accent2); }
  .kpi-card.orange .kpi-value { color: #f97316; }
  .kpi-sub { font-size: 10px; color: var(--muted); margin-top: 4px; }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
  .chart-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
  .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .table-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 10px 14px; text-align: left; font-size: 10px; color: var(--muted); text-transform: uppercase; background: var(--surface2); font-weight: 500; }
  td { padding: 12px 14px; font-size: 13px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; } tr:hover td { background: var(--surface2); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 500; }
  .badge-champ { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .badge-tit { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-rem { background: rgba(99,102,241,0.15); color: var(--accent2); }
  .badge-non { background: rgba(107,114,128,0.15); color: var(--muted); }
  .badge-vic { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-def { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-nul { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 16px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--muted); font-size: 13px; }
  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
  @media (max-width: 600px) { .charts-grid { grid-template-columns: 1fr; } .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<div id="loading" class="loading">
  <div class="spinner"></div>
  <div class="loading-text">Chargement des stats...</div>
</div>
<div id="app" style="display:none">
  <div class="header">
    <div class="title">📊 RAPPORT STATS</div>
    <div class="filters" id="seasonFilters"></div>
  </div>
  <div class="kpi-grid" id="kpiGrid"></div>
  <div class="charts-grid">
    <div class="chart-card"><div class="chart-title">⏱️ Temps de jeu par match</div><canvas id="chartTemps"></canvas></div>
    <div class="chart-card"><div class="chart-title">⚽ Buts & Passes décisives</div><canvas id="chartButs"></canvas></div>
  </div>
  <div class="table-card">
    <div class="table-header">📋 Détail des matchs</div>
    <table>
      <thead><tr><th>Match</th><th>Compét.</th><th>Statut</th><th>Résultat</th><th>⏱️</th><th>⚽</th><th>🎯</th><th>Note</th><th>Exposition</th></tr></thead>
      <tbody id="matchTable"></tbody>
    </table>
  </div>
</div>
<script>
const PROXY = 'https://notion-proxy.bastierejulie.workers.dev';
const DB_ID = '34d69796db3f801caed5d8cfa048dbba';
let allMatches = [], currentSeason = null, chartTemps, chartButs;

async function fetchMatches() {
  try {
    const res = await fetch(`${PROXY}/v1/databases/${DB_ID}/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sorts: [{ property: 'Date', direction: 'descending' }] })
    });
    if (!res.ok) throw new Error('API Error ' + res.status);
    const data = await res.json();
    return data.results || [];
  } catch(e) { console.error(e); return null; }
}

function parseMatches(results) {
  return results.map(page => {
    const p = page.properties;
    const get = (key, type) => {
      const prop = p[key];
      if (!prop) return type === 'number' ? 0 : '';
      if (type === 'number') return prop.number ?? 0;
      if (type === 'select') return prop.select?.name || '';
      if (type === 'date') return prop.date?.start || '';
      if (type === 'title') return prop.title?.[0]?.plain_text || '';
      if (type === 'formula_string') return prop.formula?.string || '';
      return '';
    };
    return {
      title: get('Adversaire + date', 'title'),
      saison: get('Saison', 'select'),
      competition: get('Compétition', 'select'),
      temps: get('⏱️ Temps de jeu', 'number'),
      buts: get('But(s) marqué(s)', 'number'),
      passes: get('Passe décissive', 'number'),
      note: get('Note joueur', 'number'),
      statut: get('Titulaire/remplaçant', 'select'),
      resultat: get('Résultats', 'select'),
      exposition: get('Exposition', 'formula_string'),
    };
  });
}

const getSeasons = m => [...new Set(m.map(x => x.saison).filter(Boolean))].sort().reverse();
const filterBySeason = (m, s) => s ? m.filter(x => x.saison === s) : m;

function renderKPIs(matches) {
  const total = matches.length;
  const joues = matches.filter(m => m.statut === 'Titulaire' || m.statut === 'Remplaçant');
  const totalMin = joues.reduce((s, m) => s + m.temps, 0);
  const totalButs = matches.reduce((s, m) => s + m.buts, 0);
  const totalPasses = matches.reduce((s, m) => s + m.passes, 0);
  const nv = joues.filter(m => m.note > 0);
  const avgNote = nv.length ? (nv.reduce((s, m) => s + m.note, 0) / nv.length).toFixed(1) : 0;
  const expo = total ? Math.round(joues.length / total * 100) : 0;
  const vic = matches.filter(m => m.resultat === 'Victoire').length;
  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card blue"><div class="kpi-label">Matchs</div><div class="kpi-value">${total}</div><div class="kpi-sub">${joues.length} joués</div></div>
    <div class="kpi-card orange"><div class="kpi-label">Exposition</div><div class="kpi-value">${expo}%</div><div class="kpi-sub">participation</div></div>
    <div class="kpi-card purple"><div class="kpi-label">Minutes</div><div class="kpi-value">${totalMin}'</div><div class="kpi-sub">${joues.length ? Math.round(totalMin/joues.length) : 0}' moy</div></div>
    <div class="kpi-card green"><div class="kpi-label">Buts</div><div class="kpi-value">${totalButs}</div><div class="kpi-sub">1/${totalButs ? Math.round(joues.length/totalButs) : '—'} matchs</div></div>
    <div class="kpi-card yellow"><div class="kpi-label">Passes déc.</div><div class="kpi-value">${totalPasses}</div><div class="kpi-sub">${totalButs+totalPasses} contributions</div></div>
    <div class="kpi-card blue"><div class="kpi-label">Note moy.</div><div class="kpi-value">${avgNote > 0 ? avgNote : '—'}</div><div class="kpi-sub">/ 10</div></div>
    <div class="kpi-card green"><div class="kpi-label">Victoires</div><div class="kpi-value">${vic}</div><div class="kpi-sub">${total ? Math.round(vic/total*100) : 0}% win</div></div>
  `;
}

function renderCharts(matches) {
  const joues = [...matches].filter(m => m.statut === 'Titulaire' || m.statut === 'Remplaçant').reverse().slice(-10);
  if (chartTemps) chartTemps.destroy();
  chartTemps = new Chart(document.getElementById('chartTemps'), {
    type: 'bar',
    data: { labels: joues.map(m => m.title.split(' ')[0]), datasets: [{ data: joues.map(m => m.temps), backgroundColor: joues.map(m => m.statut === 'Titulaire' ? 'rgba(59,130,246,0.7)' : 'rgba(99,102,241,0.7)'), borderRadius: 4 }] },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6b7280', font: { size: 9 } }, max: 100 }, x: { grid: { display: false }, ticks: { color: '#6b7280', font: { size: 9 }, maxRotation: 45 } } } }
  });
  const all = [...matches].reverse().slice(-10);
  if (chartButs) chartButs.destroy();
  chartButs = new Chart(document.getElementById('chartButs'), {
    type: 'bar',
    data: { labels: all.map(m => m.title.split(' ')[0]), datasets: [{ label: 'Buts', data: all.map(m => m.buts), backgroundColor: 'rgba(34,197,94,0.7)', borderRadius: 4 }, { label: 'Passes', data: all.map(m => m.passes), backgroundColor: 'rgba(99,102,241,0.7)', borderRadius: 4 }] },
    options: { responsive: true, plugins: { legend: { labels: { color: '#9ca3af', font: { size: 10 } } } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6b7280', font: { size: 9 } } }, x: { grid: { display: false }, ticks: { color: '#6b7280', font: { size: 9 }, maxRotation: 45 } } } }
  });
}

function renderTable(matches) {
  const tbody = document.getElementById('matchTable');
  if (!matches.length) { tbody.innerHTML = `<tr><td colspan="9" class="empty">Aucun match trouvé</td></tr>`; return; }
  const sb = s => s === 'Titulaire' ? `<span class="badge badge-tit">⭐ Titulaire</span>` : s === 'Remplaçant' ? `<span class="badge badge-rem">🔄 Remplaçant</span>` : `<span class="badge badge-non">${s||'—'}</span>`;
  const rb = r => r === 'Victoire' ? `<span class="badge badge-vic">✅ Victoire</span>` : r === 'Défaite' ? `<span class="badge badge-def">❌ Défaite</span>` : r === 'Nul' ? `<span class="badge badge-nul">🟡 Nul</span>` : '—';
  tbody.innerHTML = matches.map(m => `<tr>
    <td style="font-weight:500">${m.title||'—'}</td>
    <td>${m.competition ? `<span class="badge badge-champ">${m.competition}</span>` : '—'}</td>
    <td>${sb(m.statut)}</td><td>${rb(m.resultat)}</td>
    <td>${m.temps > 0 ? m.temps+"'" : '—'}</td>
    <td>${m.buts > 0 ? '⚽ '+m.buts : m.buts}</td>
    <td>${m.passes > 0 ? '🎯 '+m.passes : m.passes}</td>
    <td style="color:${m.note>=7?'#22c55e':m.note>=5?'#eab308':m.note>0?'#ef4444':'#6b7280'};font-weight:600">${m.note>0?m.note+'/10':'—'}</td>
    <td>${m.exposition||'—'}</td>
  </tr>`).join('');
}

function renderSeasons(seasons, active) {
  document.getElementById('seasonFilters').innerHTML = seasons.map(s => `<button class="filter-btn ${s===active?'active':''}" onclick="changeSeason('${s}')">${s}</button>`).join('');
}

function changeSeason(season) {
  currentSeason = season;
  const filtered = filterBySeason(allMatches, season);
  renderSeasons(getSeasons(allMatches), season);
  renderKPIs(filtered); renderCharts(filtered); renderTable(filtered);
}

async function init() {
  const results = await fetchMatches();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  if (!results) { document.getElementById('app').innerHTML = `<div class="empty" style="height:60vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px"><div style="font-size:32px">❌</div><div>Erreur de connexion</div></div>`; return; }
  allMatches = parseMatches(results);
  const seasons = getSeasons(allMatches);
  currentSeason = seasons[0] || null;
  renderSeasons(seasons, currentSeason);
  const filtered = filterBySeason(allMatches, currentSeason);
  renderKPIs(filtered); renderCharts(filtered); renderTable(filtered);
}
init();
</script>
</body>
</html>
