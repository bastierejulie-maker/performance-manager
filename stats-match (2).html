<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats Match</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#F4F5F7;--bg2:#ECEEF2;--card:#FFFFFF;--border:rgba(0,0,0,.08);--text:#1A1D23;--muted:#6B7280;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;padding:1.5rem;min-height:100vh;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px;}
.top-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.1em;color:var(--muted);}
.filters{display:flex;gap:6px;flex-wrap:wrap;}
.filter-btn{font-size:11px;padding:4px 12px;border-radius:5px;border:0.5px solid rgba(0,0,0,.12);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;font-family:'Barlow',sans-serif;}
.filter-btn.active{color:#fff;border-color:transparent;}
select{font-size:12px;padding:5px 10px;border-radius:6px;border:0.5px solid rgba(0,0,0,.15);background:var(--card);color:var(--text);cursor:pointer;}
.loading-state{text-align:center;padding:4rem;color:var(--muted);font-size:13px;}
.demo-btn{padding:6px 14px;border-radius:6px;border:none;background:#1D9E75;color:#fff;cursor:pointer;font-size:12px;margin-top:12px;}
.kpi-row{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-bottom:1rem;}
.kpi{background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:10px 8px 8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.kpi-val{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;line-height:1;}
.kpi-lbl{font-size:9px;color:var(--muted);letter-spacing:.05em;margin-top:3px;}
.kpi-sub{font-size:9px;color:var(--muted);opacity:.5;margin-top:1px;}
.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.chart-card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:.9rem 1rem;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.chart-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;}
.chart-title{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.05em;}
.chart-sub{font-size:9px;color:var(--muted);opacity:.6;margin-top:1px;}
.delta-tag{font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;}
.delta-tag.up{background:#E1F5EE;color:#085041;}.delta-tag.down{background:#FAECE7;color:#712B13;}.delta-tag.eq{background:var(--bg2);color:var(--muted);}
.radar-section{display:grid;grid-template-columns:240px 1fr;gap:1rem;margin-bottom:1rem;}
.table-card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:.9rem 1rem;box-shadow:0 1px 4px rgba(0,0,0,.04);overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:11px;}
thead th{font-size:9px;letter-spacing:.06em;color:var(--muted);font-weight:500;text-align:left;padding:0 8px 8px;border-bottom:0.5px solid var(--border);white-space:nowrap;}
thead th:not(:first-child){text-align:center;}
tbody tr{border-bottom:0.5px solid rgba(0,0,0,.04);transition:background .15s;}
tbody tr:hover{background:rgba(0,0,0,.02);}
tbody td{padding:7px 8px;color:var(--text);vertical-align:middle;white-space:nowrap;}
tbody td:not(:first-child){text-align:center;}
.res-badge{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;padding:2px 7px;border-radius:4px;}
.res-V{background:#E1F5EE;color:#0F6E56;}.res-D{background:#FAECE7;color:#A32D2D;}.res-N{background:#FEF3DC;color:#BA7517;}
.role-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle;}
.note-bar{height:3px;background:rgba(0,0,0,.08);border-radius:2px;margin-top:3px;}
.note-fill{height:100%;border-radius:2px;}
.highlight{font-weight:500;}
</style>
</head>
<body>
<div class="top-bar">
  <div class="top-left">
    <span class="page-title">STATS MATCH</span>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-f="all"  onclick="setFilter('all')">Tous</button>
      <button class="filter-btn"        data-f="tit"  onclick="setFilter('tit')">Titulaire</button>
      <button class="filter-btn"        data-f="rem"  onclick="setFilter('rem')">Remplaçant</button>
      <button class="filter-btn"        data-f="V"    onclick="setFilter('V')">Victoires</button>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <label style="font-size:11px;color:var(--muted);letter-spacing:.05em;">SAISON</label>
    <select id="selSaison" onchange="renderAll()"></select>
  </div>
</div>

<div id="loadingMsg" class="loading-state">Chargement des données…</div>

<div id="app" style="display:none">
  <div class="kpi-row" id="kpiRow"></div>
  <div class="main-grid">
    <div class="chart-card">
      <div class="chart-hdr"><div><div class="chart-title">TEMPS DE JEU — par match</div><div class="chart-sub">minutes</div></div><span class="delta-tag eq" id="dTps">—</span></div>
      <div style="position:relative;height:160px"><canvas id="cTps"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-hdr"><div><div class="chart-title">CONTRIBUTION OFFENSIVE</div><div class="chart-sub">buts + passes décisives</div></div></div>
      <div style="position:relative;height:160px"><canvas id="cContrib"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-hdr"><div><div class="chart-title">DISTANCE TOTALE — par match</div><div class="chart-sub">km</div></div><span class="delta-tag eq" id="dDist">—</span></div>
      <div style="position:relative;height:160px"><canvas id="cDist"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-hdr"><div><div class="chart-title">% DUELS GAGNÉS</div><div class="chart-sub">ratio par match</div></div></div>
      <div style="position:relative;height:160px"><canvas id="cDuels"></canvas></div>
    </div>
  </div>

  <div class="radar-section">
    <div class="chart-card">
      <div class="chart-hdr"><div class="chart-title">PROFIL STATISTIQUE</div></div>
      <div style="position:relative;height:210px"><canvas id="cRadar"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-hdr"><div class="chart-title">RATIOS AVANCÉS</div></div>
      <div id="ratiosGrid" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;"></div>
    </div>
  </div>

  <div class="table-card">
    <div class="chart-hdr" style="margin-bottom:.9rem">
      <div class="chart-title">DÉTAIL MATCHS</div>
      <span style="font-size:10px;color:var(--muted)" id="tableCount">—</span>
    </div>
    <table>
      <thead><tr>
        <th>MATCH</th><th>DATE</th><th>RÉS.</th><th>RÔLE</th><th>TPS</th>
        <th>⚽</th><th>🎯</th><th>TIRS</th><th>CADRÉS</th>
        <th>DUELS</th><th>%DG</th><th>DIST.</th><th>SPRINTS</th><th>NOTE</th>
      </tr></thead>
      <tbody id="matchTable"></tbody>
    </table>
  </div>
</div>

<script>
const PROXY='https://notion-proxy.bastierejulie.workers.dev';
const DB_STATS='34d69796-db3f-801c-aed5-d8cfa048dbba';
const DB_JOUEURS='34b69796-db3f-80b7-9443-000ba8d37b38';

const CLUBS={
  'PSG':{bg:'#003D83',accent:'#DA291C'},
  'Barcelone':{bg:'#A50044',accent:'#004D98'},
  'Real Madrid':{bg:'#FEBE10',accent:'#00529F'},
  'OM':{bg:'#009FC3',accent:'#26356B'},
  'Lyon':{bg:'#1A1A2E',accent:'#E4002B'},
};

let STATE={joueur:null,matchs:[],saisons:[],currentFilter:'all'};

function getProp(page,name){
  const p=page.properties?.[name];if(!p)return null;
  if(p.title)return p.title.map(t=>t.plain_text).join('');
  if(p.rich_text)return p.rich_text.map(t=>t.plain_text).join('');
  if(p.select)return p.select?.name||null;
  if(p.number!==undefined)return p.number;
  if(p.url)return p.url;
  if(p.date)return p.date?.start||null;
  return null;
}

async function notionQuery(dbId,filter){
  const r=await fetch(`${PROXY}/api/database/${dbId}/query`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({filter:filter||{},page_size:100})
  });
  if(!r.ok)throw new Error('Proxy '+r.status);
  return(await r.json()).results||[];
}

async function init(){
  try{
    const params=new URLSearchParams(location.search);
    const joueurId=params.get('joueur');
    let joueurPage;
    if(joueurId){const r=await fetch(`${PROXY}/api/page/${joueurId}`);joueurPage=await r.json();}
    else{const all=await notionQuery(DB_JOUEURS);joueurPage=all.find(p=>getProp(p,'Actif/Inactif')==='Actif')||all[0];}
    if(!joueurPage)throw new Error('Aucun joueur');
    STATE.joueur={nom:getProp(joueurPage,'Nom complet')||'Joueur',club:getProp(joueurPage,'Club actuel')||'',id:joueurPage.id};
    const filter=joueurId?{property:'Joueur',relation:{contains:joueurId}}:{};
    const allM=await notionQuery(DB_STATS,filter);
    STATE.matchs=allM.map(m=>({
      date:getProp(m,'Date'),saison:getProp(m,'Saison'),
      adv:getProp(m,'Adversaire'),res:getProp(m,'Résultats'),
      tps:getProp(m,'⏱️ Temps de jeu')||0,role:getProp(m,'Titulaire/remplaçant'),
      buts:getProp(m,'But(s) marqué(s)')||0,passes:getProp(m,'Passe décissive')||0,
      tirs:getProp(m,'Tirs')||0,cadrés:getProp(m,'Tirs cadrés')||0,
      duels:getProp(m,'Duels')||0,dg:getProp(m,'Duels gagnés')||0,
      dist:getProp(m,'Distance parcourue (m)')||0,sprint:getProp(m,'Nombre de sprint')||0,
      note:getProp(m,'Note joueur'),
    })).filter(m=>m.tps>0);
    const sSet=new Set(STATE.matchs.map(m=>m.saison).filter(Boolean));
    STATE.saisons=[...sSet].sort().reverse();
    if(!STATE.saisons.length)STATE.saisons=['2025-2026'];
    const sel=document.getElementById('selSaison');
    sel.innerHTML=STATE.saisons.map(s=>`<option value="${s}">${s}</option>`).join('');
    document.getElementById('loadingMsg').style.display='none';
    document.getElementById('app').style.display='block';
    renderAll();
  }catch(err){
    document.getElementById('loadingMsg').innerHTML=`<div>⚠️ Chargement impossible (${err.message})<br><button class="demo-btn" onclick="demo()">Voir démo</button></div>`;
  }
}

function demo(){
  STATE.joueur={nom:'Joueur Template',club:'PSG',id:''};
  STATE.saisons=['2025-2026','2024-2025'];
  STATE.matchs=[
    {date:'2025-09-14',saison:'2025-2026',adv:'Monaco',res:'Victoire',tps:90,role:'Titulaire',buts:1,passes:0,tirs:4,cadrés:3,duels:8,dg:6,dist:10800,sprint:28,note:7.5},
    {date:'2025-10-01',saison:'2025-2026',adv:'Lyon',res:'Victoire',tps:90,role:'Titulaire',buts:2,passes:1,tirs:6,cadrés:4,duels:10,dg:7,dist:11200,sprint:31,note:8.8},
    {date:'2025-10-19',saison:'2025-2026',adv:'Marseille',res:'Nul',tps:62,role:'Remplaçant',buts:0,passes:0,tirs:2,cadrés:1,duels:5,dg:3,dist:7200,sprint:22,note:6.0},
    {date:'2025-11-02',saison:'2025-2026',adv:'Lens',res:'Victoire',tps:90,role:'Titulaire',buts:1,passes:2,tirs:5,cadrés:3,duels:9,dg:6,dist:11500,sprint:33,note:8.2},
    {date:'2025-11-23',saison:'2025-2026',adv:'Nice',res:'Victoire',tps:85,role:'Titulaire',buts:0,passes:1,tirs:3,cadrés:2,duels:7,dg:5,dist:10900,sprint:29,note:7.0},
    {date:'2025-12-07',saison:'2025-2026',adv:'Bordeaux',res:'Défaite',tps:90,role:'Titulaire',buts:1,passes:0,tirs:5,cadrés:2,duels:11,dg:6,dist:11800,sprint:35,note:6.5},
    {date:'2026-01-11',saison:'2025-2026',adv:'Rennes',res:'Victoire',tps:90,role:'Titulaire',buts:2,passes:0,tirs:7,cadrés:5,duels:8,dg:5,dist:11600,sprint:34,note:8.5},
    {date:'2026-01-25',saison:'2025-2026',adv:'Auxerre',res:'Victoire',tps:58,role:'Remplaçant',buts:1,passes:0,tirs:3,cadrés:2,duels:4,dg:3,dist:6800,sprint:20,note:7.2},
    {date:'2026-02-08',saison:'2025-2026',adv:'Nantes',res:'Victoire',tps:90,role:'Titulaire',buts:0,passes:2,tirs:4,cadrés:3,duels:9,dg:7,dist:11900,sprint:36,note:7.8},
    {date:'2026-03-08',saison:'2025-2026',adv:'Metz',res:'Victoire',tps:90,role:'Titulaire',buts:3,passes:1,tirs:8,cadrés:6,duels:10,dg:8,dist:12100,sprint:38,note:9.5},
    {date:'2026-04-12',saison:'2025-2026',adv:'Troyes',res:'Victoire',tps:90,role:'Titulaire',buts:1,passes:2,tirs:5,cadrés:4,duels:9,dg:7,dist:12300,sprint:40,note:8.0},
  ];
  const sel=document.getElementById('selSaison');
  sel.innerHTML=STATE.saisons.map(s=>`<option value="${s}">${s}</option>`).join('');
  document.getElementById('loadingMsg').style.display='none';
  document.getElementById('app').style.display='block';
  renderAll();
}

function filterMatchs(matchs){
  const f=STATE.currentFilter;
  if(f==='tit')return matchs.filter(m=>m.role==='Titulaire');
  if(f==='rem')return matchs.filter(m=>m.role==='Remplaçant');
  if(f==='V')return matchs.filter(m=>m.res==='Victoire');
  return matchs;
}

function setFilter(f){
  STATE.currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>{
    const isActive=b.dataset.f===f;
    b.classList.toggle('active',isActive);
    const club=CLUBS[STATE.joueur?.club]||{bg:'#1D9E75'};
    b.style.background=isActive?club.bg:'';
    b.style.color=isActive?'#fff':'';
  });
  renderAll();
}

function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0;}
const CH={};function kill(id){if(CH[id]){CH[id].destroy();delete CH[id];}}
const GR='rgba(0,0,0,.05)',TK='#aaa';

function makeLine(id,labels,datasets,col){
  kill(id);const ctx=document.getElementById(id);if(!ctx)return;
  const C=[col||'#1D9E75','#534AB7'];
  const ds=datasets.map((d,i)=>({label:d.label,data:d.data,borderColor:C[i],backgroundColor:C[i]+'18',borderWidth:2,pointRadius:3,fill:i===0,tension:.35,borderDash:i===1?[4,3]:[],pointBackgroundColor:C[i]}));
  CH[id]=new Chart(ctx,{type:'line',data:{labels,datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:datasets.length>1,labels:{boxWidth:8,font:{size:10},color:TK,usePointStyle:true}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.parsed.y.toFixed(1)}}},scales:{x:{grid:{color:GR},ticks:{font:{size:10},color:TK,maxRotation:45}},y:{grid:{color:GR},ticks:{font:{size:10},color:TK}}}}});
}
function makeBar(id,labels,datasets,col){
  kill(id);const ctx=document.getElementById(id);if(!ctx)return;
  const C=[col,'#534AB7'];
  CH[id]=new Chart(ctx,{type:'bar',data:{labels,datasets:datasets.map((d,i)=>({label:d.label,data:d.data,backgroundColor:C[i]+'88',borderColor:C[i],borderWidth:1,borderRadius:3}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:datasets.length>1,labels:{boxWidth:8,font:{size:10},color:TK}}},scales:{x:{grid:{display:false},ticks:{font:{size:10},color:TK,maxRotation:45}},y:{grid:{color:GR},ticks:{font:{size:10},color:TK}}}}});
}
function makeRadar(id,labels,data,col){
  kill(id);const ctx=document.getElementById(id);if(!ctx)return;
  CH[id]=new Chart(ctx,{type:'radar',data:{labels,datasets:[{data,borderColor:col,backgroundColor:col+'20',borderWidth:2,pointBackgroundColor:col,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{r:{grid:{color:GR},ticks:{display:false},pointLabels:{font:{size:10},color:TK},angleLines:{color:GR}}}}});
}
function setDelta(id,s){
  const el=document.getElementById(id);
  if(!s||s.filter(v=>v>0).length<2){el.textContent='—';el.className='delta-tag eq';return;}
  const v=s.filter(x=>x>0);const diff=v[v.length-1]-v[0];const pct=Math.round(diff/v[0]*100);
  if(diff>0){el.textContent='+'+pct+'%';el.className='delta-tag up';}
  else if(diff<0){el.textContent=pct+'%';el.className='delta-tag down';}
  else{el.textContent='stable';el.className='delta-tag eq';}
}

function renderAll(){
  const saison=document.getElementById('selSaison').value;
  const allSaison=[...STATE.matchs.filter(m=>m.saison===saison)].sort((a,b)=>a.date?.localeCompare(b.date));
  const mf=filterMatchs(allSaison);
  const club=CLUBS[STATE.joueur?.club]||{bg:'#003D83',accent:'#DA291C'};
  const col=club.bg;

  // Style filtres
  document.querySelectorAll('.filter-btn.active').forEach(b=>{b.style.background=col;b.style.color='#fff';});

  if(!mf.length){
    document.getElementById('kpiRow').innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:2rem;font-size:13px;">Aucun match pour ce filtre.</div>';
    return;
  }

  const labels=mf.map(m=>m.adv||(m.date?.slice(5))||'');
  const tButs=mf.reduce((a,m)=>a+m.buts,0);
  const tPasses=mf.reduce((a,m)=>a+m.passes,0);
  const tTirs=mf.reduce((a,m)=>a+m.tirs,0);
  const tCadr=mf.reduce((a,m)=>a+m.cadrés,0);
  const avgNote=avg(mf.filter(m=>m.note).map(m=>m.note));
  const avgTps=Math.round(avg(mf.map(m=>m.tps)));
  const pctDG=mf.reduce((a,m)=>a+m.duels,0)?Math.round(mf.reduce((a,m)=>a+m.dg,0)/mf.reduce((a,m)=>a+m.duels,0)*100):0;

  const kpis=[
    {val:mf.length,lbl:'MATCHS',sub:''},
    {val:tButs,lbl:'BUTS',sub:''},
    {val:tPasses,lbl:'PASSES DÉC.',sub:''},
    {val:tButs+tPasses,lbl:'G+A',sub:''},
    {val:avgTps+"'",lbl:'TPS MOY.',sub:''},
    {val:tTirs?Math.round(tCadr/tTirs*100)+'%':'—',lbl:'% CADRÉS',sub:''},
    {val:pctDG+'%',lbl:'% DUELS G.',sub:''},
    {val:mf.filter(m=>m.note).length?avgNote.toFixed(1):'—',lbl:'NOTE MOY.',sub:'/10'},
  ];
  document.getElementById('kpiRow').innerHTML=kpis.map(k=>`<div class="kpi"><div class="kpi-val" style="color:${col}">${k.val}</div><div class="kpi-lbl">${k.lbl}</div>${k.sub?`<div class="kpi-sub">${k.sub}</div>`:''}</div>`).join('');

  makeLine('cTps',labels,[{label:'Minutes',data:mf.map(m=>m.tps)}],col);setDelta('dTps',mf.map(m=>m.tps));
  makeBar('cContrib',labels,[{label:'Buts',data:mf.map(m=>m.buts)},{label:'Passes',data:mf.map(m=>m.passes)}],col);
  makeLine('cDist',labels,[{label:'Distance',data:mf.map(m=>+(m.dist/1000).toFixed(2))}],col);setDelta('dDist',mf.map(m=>m.dist));
  makeLine('cDuels',labels,[{label:'% Duels',data:mf.map(m=>m.duels?Math.round(m.dg/m.duels*100):0)}],col);

  const radarData=[
    tTirs?avg(mf.map(m=>m.tirs?m.cadrés/m.tirs*10:0)):0,
    avg(mf.map(m=>m.passes)),
    pctDG/10,
    avg(mf.map(m=>m.sprint))/4,
    mf.filter(m=>m.note).length?avg(mf.filter(m=>m.note).map(m=>m.note)):0,
    avg(mf.map(m=>m.dist/1200)),
  ].map(v=>Math.min(10,Math.max(0,Math.round(v*10)/10)));
  makeRadar('cRadar',['Efficacité tir','Création','Duels','Vitesse','Note','Volume'],radarData,col);

  const titulaires=mf.filter(m=>m.role==='Titulaire');
  const ratios=[
    {lbl:'MIN/BUT',val:tButs?Math.round(mf.reduce((a,m)=>a+m.tps,0)/tButs)+"'":'—'},
    {lbl:'TIR/BUT',val:tButs?(tTirs/tButs).toFixed(1):'—'},
    {lbl:'CADRÉS %',val:tTirs?Math.round(tCadr/tTirs*100)+'%':'—'},
    {lbl:'G+A / 90',val:(((tButs+tPasses)/Math.max(mf.reduce((a,m)=>a+m.tps,0),1))*90).toFixed(2)},
    {lbl:'KM/MATCH',val:titulaires.length?(avg(titulaires.map(m=>m.dist))/1000).toFixed(1)+' km':'—'},
    {lbl:'SPRINTS',val:Math.round(avg(mf.map(m=>m.sprint)))},
  ];
  document.getElementById('ratiosGrid').innerHTML=ratios.map(r=>`<div style="background:var(--bg2);border-radius:8px;padding:8px 10px;text-align:center"><div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:${col};line-height:1">${r.val}</div><div style="font-size:9px;color:var(--muted);letter-spacing:.05em;margin-top:3px">${r.lbl}</div></div>`).join('');

  document.getElementById('tableCount').textContent=mf.length+' match'+(mf.length>1?'s':'');
  const roleDot={Titulaire:col,Remplaçant:club.accent};
  document.getElementById('matchTable').innerHTML=mf.map(m=>{
    const resK=m.res==='Victoire'?'V':m.res==='Défaite'?'D':'N';
    const noteColor=m.note>=8?'#0F6E56':m.note>=6.5?'#BA7517':'#A32D2D';
    return`<tr>
      <td style="font-weight:500">${m.adv||'—'}</td>
      <td style="color:var(--muted);font-size:10px">${m.date||'—'}</td>
      <td><span class="res-badge res-${resK}">${resK==='V'?'Vic':resK==='D'?'Déf':'Nul'}</span></td>
      <td style="font-size:10px;color:var(--muted)"><span class="role-dot" style="background:${roleDot[m.role]||'#888'}"></span>${m.role||'—'}</td>
      <td>${m.tps}'</td>
      <td class="${m.buts>0?'highlight':''}" style="${m.buts>0?'color:'+col:''}">${m.buts||'—'}</td>
      <td class="${m.passes>0?'highlight':''}" style="${m.passes>0?'color:'+col:''}">${m.passes||'—'}</td>
      <td>${m.tirs||'—'}</td>
      <td>${m.cadrés||'—'}${m.tirs?' <span style="font-size:9px;color:var(--muted)">('+Math.round(m.cadrés/m.tirs*100)+'%)</span>':''}</td>
      <td>${m.dg}/${m.duels}</td>
      <td>${m.duels?Math.round(m.dg/m.duels*100)+'%':'—'}</td>
      <td>${m.dist?(m.dist/1000).toFixed(1)+' km':'—'}</td>
      <td>${m.sprint||'—'}</td>
      <td>${m.note?`<span style="font-weight:500;color:${noteColor}">${m.note.toFixed(1)}</span><div class="note-bar"><div class="note-fill" style="width:${m.note*10}%;background:${noteColor}"></div></div>`:'—'}</td>
    </tr>`;
  }).join('');
}

init();
</script>
</body>
</html>
