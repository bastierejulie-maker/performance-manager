<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance Manager — Espace Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black: #ffffff;
  --surface: #ffffff;
  --white: #1a1d23;
  --white-dim: rgba(26,29,35,0.65);
  --white-faint: rgba(0,0,0,0.06);
  --gold: #b8924c;
  --gold-dim: rgba(184,146,76,0.35);
  --gold-faint: rgba(184,146,76,0.07);
  --green: #1d9e75;
  --orange: #c97631;
  --red: #b74545;
  --yellow: #b8902b;
  --muted: #6b7280;
  --border: rgba(184,146,76,0.22);
}
html, body { min-height: 100vh; background: #F4F5F7; color: var(--white); font-family: 'DM Mono', monospace; font-weight: 300; }

/* Header premium */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.header-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 300;
}
.header-brand em { color: var(--gold); font-style: italic; }
.header-right {
  display: flex;
  align-items: center;
  gap: 32px;
}
.header-agent {
  text-align: right;
}
.header-agent-name {
  font-size: 11px;
  color: var(--white);
  letter-spacing: 0.05em;
}
.header-agent-role {
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
}
.btn-logout {
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  transition: color 0.2s;
}
.btn-logout:hover { color: var(--red); }

/* Hero section */
.hero {
  padding: 64px 48px 48px;
  border-bottom: 1px solid var(--border);
}
.hero-label {
  font-size: 9px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 16px;
}
.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 44px;
  font-weight: 300;
  line-height: 1.1;
  letter-spacing: -0.01em;
}
.hero-title em { font-style: italic; color: var(--gold); }
.hero-sub {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.1em;
  margin-top: 12px;
}

/* Athletes grid */
.athletes-section { padding: 48px; }
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
}
.section-label {
  font-size: 9px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--muted);
}
.athletes-count {
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--gold);
}

.athletes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1px;
  background: var(--border);
}

.athlete-card {
  background: var(--black);
  padding: 32px;
  cursor: pointer;
  transition: background 0.2s;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.athlete-card:hover { background: var(--gold-faint); }

.athlete-header { display: flex; justify-content: space-between; align-items: flex-start; }
.athlete-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 300;
  color: var(--white);
  line-height: 1.1;
}
.athlete-club {
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin-top: 4px;
  text-transform: uppercase;
}
.athlete-status { flex-shrink: 0; }

.badge {
  display: inline-block;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 2px;
}
.badge-green { background: rgba(76,175,130,0.12); color: var(--green); }
.badge-orange { background: rgba(232,130,74,0.12); color: var(--orange); }
.badge-red { background: rgba(217,91,91,0.12); color: var(--red); }
.badge-yellow { background: rgba(212,168,67,0.12); color: var(--yellow); }
.badge-muted { background: var(--white-faint); color: var(--muted); }

.athlete-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.meta-item {}
.meta-label {
  font-size: 8px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}
.meta-value {
  font-size: 12px;
  color: var(--white-dim);
}

.athlete-arrow {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  align-self: flex-end;
  transition: color 0.2s;
}
.athlete-card:hover .athlete-arrow { color: var(--gold); }

/* Loading / Empty */
.state-block {
  padding: 80px 48px;
  text-align: center;
}
.state-block p {
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
}
.state-number {
  font-family: 'Cormorant Garamond', serif;
  font-size: 64px;
  color: var(--gold);
  opacity: 0.2;
  margin-bottom: 16px;
}
.loading-dots::after { content: '···'; animation: dots 1.2s infinite; }
@keyframes dots { 0%,100%{opacity:1} 50%{opacity:0.3} }

@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
.athlete-card { animation: fadeUp 0.4s ease both; }
.athlete-card:nth-child(2) { animation-delay: 0.05s; }
.athlete-card:nth-child(3) { animation-delay: 0.1s; }
.athlete-card:nth-child(4) { animation-delay: 0.15s; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-brand">Performance <em>Manager</em></div>
  <div class="header-right">
    <div class="header-agent">
      <div class="header-agent-name" id="agent-name">—</div>
      <div class="header-agent-role">Agent</div>
    </div>
    <button class="btn-logout" onclick="logout()">Déconnexion</button>
  </div>
</header>

<!-- Hero -->
<div class="hero">
  <div class="hero-label">Espace privé</div>
  <h1 class="hero-title">Vos <em>athlètes</em></h1>
  <p class="hero-sub" id="hero-sub">Suivi en temps réel · Données confidentielles</p>
</div>

<!-- Athletes -->
<div class="athletes-section">
  <div class="section-header">
    <span class="section-label">Roster</span>
    <span class="athletes-count" id="athletes-count"></span>
  </div>
  <div id="athletes-container">
    <div class="state-block">
      <p class="loading-dots">Chargement</p>
    </div>
  </div>
</div>

<script>
const PROXY = 'https://notion-proxy.bastierejulie.workers.dev';
const DB_JOUEURS = '34b69796-db3f-8002-9344-eba7a2c4dbe4';

// ── Auth guard ──────────────────────────────
const user = JSON.parse(sessionStorage.getItem('pm_user') || 'null');
if (!user || !['admin','agent'].includes(user.role)) window.location.href = 'login.html';

// ── Setup ───────────────────────────────────
const agentName = user.role === 'admin' ? 'Julie Bastière' : (user.name || 'Agent');
document.getElementById('agent-name').textContent = agentName;

function logout() {
  sessionStorage.removeItem('pm_user');
  window.location.href = 'login.html';
}

function txt(prop) { return prop?.rich_text?.[0]?.plain_text || prop?.title?.[0]?.plain_text || '—'; }
function sel(prop) { return prop?.select?.name || '—'; }

function statusBadge(statut) {
  const map = { 'Disponible':'green','Blessé':'red','En rééducation':'orange','Indisponible':'muted' };
  return `<span class="badge badge-${map[statut]||'muted'}">${statut||'—'}</span>`;
}

// ── Chargement athlètes ──────────────────────
async function load() {
  try {
    let filter = {};
    // Si agent : filtrer uniquement ses athlètes par IDs
    if (user.role === 'agent' && user.athleteIds) {
      const ids = user.athleteIds.split(',').map(s => s.trim()).filter(Boolean);
      if (ids.length === 1) {
        filter = { property: 'Nom complet', title: { is_not_empty: true } };
        // On filtre côté client après
      }
    }

    const r = await fetch(`${PROXY}/v1/databases/${DB_JOUEURS}/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sorts: [{ property: 'Nom complet', direction: 'ascending' }]
      })
    });
    const d = await r.json();
    let rows = d.results || [];

    // Filtrage par IDs pour les agents
    if (user.role === 'agent' && user.athleteIds) {
      const ids = user.athleteIds.split(',').map(s => s.trim().replace(/-/g,''));
      rows = rows.filter(row => ids.includes(row.id.replace(/-/g,'')));
    }

    render(rows);
  } catch(e) {
    document.getElementById('athletes-container').innerHTML =
      `<div class="state-block"><p>Erreur de connexion au serveur</p></div>`;
  }
}

function render(rows) {
  const container = document.getElementById('athletes-container');
  document.getElementById('athletes-count').textContent = `${rows.length} athlète${rows.length > 1 ? 's' : ''}`;

  if (!rows.length) {
    container.innerHTML = `<div class="state-block">
      <div class="state-number">∅</div>
      <p>Aucun athlète associé à ce compte</p>
    </div>`;
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'athletes-grid';
  grid.innerHTML = rows.map(r => {
    const p = r.properties;
    const nom = txt(p['Nom complet']);
    const club = txt(p['Club actuel']);
    const poste = sel(p['Poste']);
    const statut = sel(p['Statut']);
    const motricite = sel(p['Motricité']);
    const fibres = sel(p['Fibres']);
    const nationalite = txt(p['Nationalité sportive']);

    return `
      <div class="athlete-card" onclick="window.location='joueur.html?id=${r.id}'">
        <div class="athlete-header">
          <div>
            <div class="athlete-name">${nom}</div>
            <div class="athlete-club">${club !== '—' ? club : ''}</div>
          </div>
          <div class="athlete-status">${statusBadge(statut)}</div>
        </div>
        <div class="athlete-meta">
          <div class="meta-item">
            <div class="meta-label">Poste</div>
            <div class="meta-value">${poste}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Nationalité</div>
            <div class="meta-value">${nationalite}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Motricité</div>
            <div class="meta-value">${motricite}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Fibres</div>
            <div class="meta-value">${fibres}</div>
          </div>
        </div>
        <div class="athlete-arrow">Voir le profil →</div>
      </div>`;
  }).join('');

  container.innerHTML = '';
  container.appendChild(grid);
}

load();
</script>
</body>
</html>
