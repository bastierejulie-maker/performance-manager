<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Espace Athlète — Julie Bastière Performance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c1:#004170;--c2:#DA291C;
  --bg:#0a0a0c;--bg2:#111114;--bg3:#16161a;
  --bdr:rgba(255,255,255,.07);--bdr2:rgba(255,255,255,.13);
  --txt:#f0ede8;--txt-m:#8a8680;--txt-d:#4a4844;
  --gold:#c9a84c;--r:14px;
  --ov-bg:#f5f3ef;--ov-card:#ffffff;--ov-bdr:rgba(0,0,0,.07);
  --ov-txt:#1a1814;--ov-muted:#6b6455;--ov-dim:#9a907e;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
[data-club="PSG"]{--c1:#004170;--c2:#DA291C}
[data-club="OM"],[data-club="Marseille"]{--c1:#009EDF;--c2:#2C9DC9}
[data-club="Lens"]{--c1:#F9B000;--c2:#DA121A}
[data-club="Lyon"]{--c1:#003D8F;--c2:#D81920}
[data-club="Monaco"],[data-club="AS Monaco"]{--c1:#E8002D;--c2:#b8001f}
[data-club="Nice"]{--c1:#1D1B4E;--c2:#C8102E}
[data-club="Lille"]{--c1:#D10A0A;--c2:#a00808}
[data-club="Rennes"]{--c1:#1B1B1B;--c2:#D21F3C}
[data-club="Juventus"]{--c1:#1a1a1a;--c2:#c8aa6e}
[data-club="Real Madrid"]{--c1:#00529F;--c2:#FEBE10}
[data-club="Barcelona"]{--c1:#004D98;--c2:#A50044}
[data-club="Arsenal"]{--c1:#EF0107;--c2:#c0392b}
[data-club="Chelsea"]{--c1:#034694;--c2:#034694}
[data-club="Bayern"]{--c1:#DC052D;--c2:#0066B2}

html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ── HERO ── */
.hero{position:relative;min-height:280px;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:linear-gradient(145deg,var(--c1) 0%,color-mix(in srgb,var(--c1) 55%,#000) 50%,#080809 100%);z-index:0}
.hero-glow{position:absolute;top:-60px;right:-60px;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,color-mix(in srgb,var(--c2) 30%,transparent) 0%,transparent 65%);z-index:1;pointer-events:none}
.hero-pattern{position:absolute;inset:0;z-index:1;background:repeating-linear-gradient(-45deg,transparent,transparent 36px,rgba(255,255,255,.012) 36px,rgba(255,255,255,.012) 37px);pointer-events:none}
.hero-stripe{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--c2),var(--c1),transparent);z-index:3}
.hero-body{position:relative;z-index:2;padding:24px 20px 28px;display:flex;align-items:flex-end;gap:18px}
.photo-wrap{position:relative;flex-shrink:0}
.photo{width:88px;height:88px;border-radius:50%;object-fit:cover;border:2.5px solid var(--c2);background:rgba(0,0,0,.4);display:block}
.photo-init{width:88px;height:88px;border-radius:50%;border:2.5px solid rgba(255,255,255,.15);background:color-mix(in srgb,var(--c1) 40%,#000);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',serif;font-size:30px;color:rgba(255,255,255,.35);letter-spacing:.05em}
.status-dot{position:absolute;bottom:4px;right:4px;width:14px;height:14px;border-radius:50%;border:2px solid #0a0a0c}
.sd-disponible{background:#4caf7d}.sd-blesse{background:#e57373}.sd-en-reeducation{background:#ffb74d}.sd-indisponible{background:#78909c}
.hero-info{flex:1;min-width:0}
.club-line{display:flex;align-items:center;gap:5px;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:6px;font-family:'Syne',sans-serif;font-weight:600}
.club-pip{width:6px;height:6px;border-radius:50%;background:var(--c2);flex-shrink:0}
.hero-name{font-family:'Bebas Neue',serif;font-size:clamp(30px,6vw,52px);line-height:.9;color:#fff;letter-spacing:.03em;margin-bottom:10px;text-shadow:0 2px 24px rgba(0,0,0,.5)}
.htags{display:flex;flex-wrap:wrap;gap:5px}
.htag{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.55);background:rgba(255,255,255,.04);font-family:'Syne',sans-serif}
.htag.hl{background:var(--c2);border-color:var(--c2);color:#fff}
.hero-top-right{position:absolute;top:16px;right:16px;z-index:4}
.statut-pill{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:4px 11px;border-radius:20px;font-family:'Syne',sans-serif;white-space:nowrap}
.sp-disponible{background:rgba(76,175,125,.15);color:#4caf7d;border:1px solid rgba(76,175,125,.25)}
.sp-blesse{background:rgba(229,115,115,.15);color:#e57373;border:1px solid rgba(229,115,115,.25)}
.sp-en-reeducation{background:rgba(255,183,77,.15);color:#ffb74d;border:1px solid rgba(255,183,77,.25)}
.sp-indisponible{background:rgba(120,144,156,.15);color:#78909c;border:1px solid rgba(120,144,156,.25)}

/* ── NAV ── */
.nav{background:var(--bg2);border-bottom:1px solid var(--bdr);display:flex;padding:0 4px;overflow-x:auto;scrollbar-width:none;position:sticky;top:0;z-index:100;-webkit-overflow-scrolling:touch}
.nav::-webkit-scrollbar{display:none}
.nav-t{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:var(--txt-d);padding:12px 14px 11px;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;user-select:none;display:flex;align-items:center;gap:5px;flex-shrink:0}
.nav-t .ni{font-size:13px;line-height:1}
.nav-t.active{color:var(--c2);border-bottom-color:var(--c2)}
.nav-t:hover:not(.active){color:var(--txt-m)}
.nav-label{display:inline}

/* ── SECTIONS ── */
.sec{display:none;animation:fu .25s ease}.sec.active{display:block}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* Dark sections */
.sec-dark{background:var(--bg);padding:20px 16px;min-height:60vh}
/* Light sections */
.sec-light{background:var(--ov-bg);padding:20px 16px;min-height:60vh}

/* ── CARDS DARK ── */
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;position:relative}
.card-p{padding:16px}
.card-h{padding:11px 16px;border-bottom:1px solid var(--bdr);background:var(--bg3);display:flex;align-items:center;justify-content:space-between}
.card-ht{font-family:'Syne',sans-serif;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--txt-d);font-weight:700}

/* ── CARDS LIGHT ── */
.lcard{background:#fff;border:1px solid var(--ov-bdr);border-radius:var(--r);overflow:hidden}
.lcard-p{padding:14px 16px}
.lcard-h{padding:10px 14px;border-bottom:1px solid var(--ov-bdr);background:#f8f7f4;display:flex;align-items:center;justify-content:space-between}
.lcard-ht{font-family:'Syne',sans-serif;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--ov-dim);font-weight:700}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g-auto{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.mb{margin-bottom:14px}
.mb2{margin-bottom:20px}

/* ── KPI DARK ── */
.kpi{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:14px 15px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--c1),var(--c2));opacity:.5}
.kpi-l{font-family:'Syne',sans-serif;font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--txt-d);font-weight:700;margin-bottom:6px}
.kpi-v{font-family:'Bebas Neue',serif;font-size:26px;line-height:1;color:var(--txt);letter-spacing:.02em}
.kpi-v.accent{color:var(--c2)}.kpi-v.gold{color:var(--gold)}.kpi-v.green{color:#4caf7d}.kpi-v.warn{color:#ffb74d}.kpi-v.red{color:#e57373}
.kpi-s{font-size:10px;color:var(--txt-d);margin-top:4px;font-weight:300}

/* ── KPI LIGHT ── */
.lkpi{background:#fff;border:1px solid var(--ov-bdr);border-radius:var(--r);padding:14px 15px;text-align:center}
.lkpi-v{font-family:'Bebas Neue',serif;font-size:36px;line-height:1}
.lkpi-l{font-family:'Syne',sans-serif;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--ov-dim);font-weight:700;margin-top:5px}

/* ── SECTION TITLE ── */
.st{font-family:'Syne',sans-serif;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--txt-d);font-weight:700;margin-bottom:11px;display:flex;align-items:center;gap:10px}
.st::after{content:'';flex:1;height:1px;background:var(--bdr)}
.lst{font-family:'Syne',sans-serif;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--ov-dim);font-weight:700;margin-bottom:11px;display:flex;align-items:center;gap:10px}
.lst::after{content:'';flex:1;height:1px;background:var(--ov-bdr)}

/* ── PROFIL BARS ── */
.pbar{margin-bottom:12px}
.pbar-top{display:flex;justify-content:space-between;margin-bottom:5px}
.pbar-l{font-size:11px;color:var(--txt-m);font-weight:400}
.pbar-v{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--txt)}
.pbar-track{height:4px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.pbar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--c1),var(--c2));transition:width 1s cubic-bezier(.4,0,.2,1)}
.pbar-fill.warn{background:#ffb74d}.pbar-fill.nope{background:#e57373}.pbar-fill.ok{background:linear-gradient(90deg,var(--c1),var(--c2))}

/* ── ROW ── */
.row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bdr)}
.row:last-child{border-bottom:none}
.row-l{font-size:11px;color:var(--txt-m);font-weight:300}
.row-v{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;color:var(--txt)}
.lrow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--ov-bdr)}
.lrow:last-child{border-bottom:none}
.lrow-l{font-size:11px;color:var(--ov-muted);font-weight:300}
.lrow-v{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;color:var(--ov-txt)}

/* ── TAGS ── */
.tag{display:inline-block;font-family:'Syne',sans-serif;font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:20px}
.tag-v{background:rgba(76,175,125,.1);color:#4caf7d;border:1px solid rgba(76,175,125,.15)}
.tag-w{background:rgba(255,183,77,.1);color:#ffb74d;border:1px solid rgba(255,183,77,.15)}
.tag-d{background:rgba(229,115,115,.1);color:#e57373;border:1px solid rgba(229,115,115,.15)}
.tag-n{background:rgba(255,183,77,.12);color:#d4a04a;border:1px solid rgba(255,183,77,.15)}
.tag-b{background:color-mix(in srgb,var(--c1) 12%,transparent);color:color-mix(in srgb,var(--c1) 80%,white);border:1px solid color-mix(in srgb,var(--c1) 25%,transparent)}

/* ── CHART ── */
.chart-wrap{position:relative}

/* ── MATCH CARD ── */
.mcard{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.mcard-h{padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.mcard-b{padding:12px 14px}
.mcard-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.mstat{text-align:center}
.mstat-v{font-family:'Bebas Neue',serif;font-size:20px;line-height:1;color:var(--txt)}
.mstat-l{font-family:'Syne',sans-serif;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt-d);font-weight:600;margin-top:3px}

/* ── SELECT STYLE ── */
.sel{font-size:11px;padding:6px 10px;border-radius:8px;border:1px solid var(--bdr2);background:var(--bg3);color:var(--txt);cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;outline:none;-webkit-appearance:none;appearance:none}
.lsel{font-size:11px;padding:6px 10px;border-radius:8px;border:1px solid var(--ov-bdr);background:#fff;color:var(--ov-txt);cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;outline:none}

/* ── NORMES BAR ── */
.norme{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px}
.norme-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
.norme-l{font-family:'Syne',sans-serif;font-size:8px;letter-spacing:.13em;text-transform:uppercase;color:var(--txt-d);font-weight:700}
.norme-vals{display:flex;align-items:baseline;gap:4px}
.norme-v{font-family:'Bebas Neue',serif;font-size:22px;color:var(--txt)}
.norme-ref{font-size:9px;color:var(--txt-d)}
.norme-track{height:4px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden;margin-bottom:5px}
.norme-fill{height:100%;border-radius:4px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.norme-ok{background:linear-gradient(90deg,var(--c1),var(--c2))}
.norme-warn{background:#ffb74d}.norme-nope{background:#e57373}
.badge{display:inline-block;font-family:'Syne',sans-serif;font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:20px}
.badge-ok{background:rgba(76,175,125,.1);color:#4caf7d}
.badge-warn{background:rgba(255,183,77,.1);color:#ffb74d}
.badge-nope{background:rgba(229,115,115,.1);color:#e57373}

/* ── PROFIL CARD ── */
.pcard{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden}
.pcard::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--c1),var(--c2))}
.pcard-t{font-family:'Syne',sans-serif;font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--txt-d);font-weight:700;margin-bottom:6px}
.pcard-v{font-family:'Bebas Neue',serif;font-size:22px;color:var(--txt);letter-spacing:.04em;margin-bottom:4px}
.pcard-d{font-size:11px;color:var(--txt-m);font-weight:300;line-height:1.5}

/* ── BLESSURE CARD ── */
.bcard{background:#fff;border:1px solid var(--ov-bdr);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.bcard-h{padding:10px 14px;background:#f8f7f4;border-bottom:1px solid var(--ov-bdr);display:flex;align-items:center;justify-content:space-between}
.bcard-b{padding:12px 14px}
.bcard-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bstat-l{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--ov-dim);font-family:'Syne',sans-serif;font-weight:700;margin-bottom:3px}
.bstat-v{font-size:12px;color:var(--ov-txt);font-weight:500}

/* ── EMPTY ── */
.empty{padding:40px 20px;text-align:center;color:var(--txt-d);font-size:12px;font-style:italic;font-weight:300}
.lempty{padding:40px 20px;text-align:center;color:var(--ov-dim);font-size:12px;font-style:italic;border:1px dashed var(--ov-bdr);border-radius:var(--r)}

/* ── FOOTER ── */
.footer{padding:16px 20px;border-top:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding-bottom:calc(16px + var(--safe-bottom))}
.fb{font-family:'Bebas Neue',serif;font-size:14px;color:var(--txt-d);letter-spacing:.06em}
.fs{font-size:9px;color:var(--txt-d);font-weight:300;margin-top:1px}
.fr{font-size:9px;color:var(--txt-d);text-align:right;font-weight:300}

/* ── RESPONSIVE ── */
@media(min-width:600px){
  .hero-body{padding:28px 28px 32px;gap:22px}
  .photo{width:100px;height:100px}.photo-init{width:100px;height:100px}
  .sec-dark,.sec-light{padding:24px 24px}
  .nav-t{padding:13px 18px 12px;font-size:11px}
  .g2{gap:12px}.g3{gap:12px}
  .mcard-grid{grid-template-columns:repeat(4,1fr)}
}
@media(min-width:1080px){
  .hero-body{padding:32px 40px 36px;max-width:1080px;margin:0 auto}
  .sec-dark,.sec-light{padding:28px 40px;max-width:1080px;margin:0 auto}
  .nav{padding:0 40px}
  .footer{max-width:1080px;margin:0 auto;padding-left:40px;padding-right:40px}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
}
</style>
</head>
<body>

<div id="hero-wrap"></div>

<div class="nav" id="main-nav">
  <div class="nav-t active" onclick="sw('overview',this)">Aperçu</div>
  <div class="nav-t" onclick="sw('matchs',this)">Matchs</div>
  <div class="nav-t" onclick="sw('perf',this)">Physique</div>
  <div class="nav-t" onclick="sw('nutrition',this)">Nutrition</div>
  <div class="nav-t" onclick="sw('sante',this)">Santé</div>
</div>

<div id="s-overview" class="sec active sec-light"></div>
<div id="s-matchs"   class="sec sec-light"></div>
<div id="s-perf"     class="sec sec-light"></div>
<div id="s-nutrition" class="sec sec-light"></div>
<div id="s-sante"    class="sec sec-light"></div>

<div class="footer">
  <div><div class="fb">Julie Bastière</div><div class="fs">Performance Manager</div></div>
  <div class="fr" id="sync-info">Chargement…</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const PROXY='https://notion-proxy.bastierejulie.workers.dev';
const DB_J='34b69796-db3f-8002-9344-eba7a2c4dbe4';
const DB_S='34d69796-db3f-801c-aed5-d8cfa048dbba';
const DB_T='34d69796-db3f-8047-b6f9-e361371604a9';
const DB_N='f0596ef8-c95d-4c18-b35a-a647b4325378';
const DB_B='34d69796-db3f-80ec-8721-c4ec84c7bc53';
const DB_MET='34d69796-db3f-8051-afd1-d25038dfc12e'; // Suivi métriques (poids/MG/conseils diet)
const DB_REC='6e70e21a-fcb0-40a1-af75-c93c24fb9627'; // Recettes globales
const DB_CLI='726d3b94-8089-464f-8d62-e4100a59b1c0'; // Clips analyste

const NORMES={
  'Excentré':{vmax:35,accmax:7.5,cmj:48,sj:44,vma:18},
  'Attaquant':{vmax:34,accmax:7.0,cmj:46,sj:42,vma:18},
  'Milieu offensif':{vmax:32.5,accmax:6.5,cmj:44,sj:40,vma:18},
  'Milieu défensif':{vmax:31.5,accmax:6.5,cmj:43,sj:39,vma:18},
  'Latéral':{vmax:33,accmax:7.0,cmj:45,sj:41,vma:18},
  'Défenseur central':{vmax:31,accmax:6.0,cmj:46,sj:42,vma:18},
  'Gardien':{vmax:28,accmax:6.5,cmj:55,sj:50,vma:14},
};

const P=new URLSearchParams(location.search);
const JID=P.get('id')||null;
let J=null,ST=[],TS=[],NU=[],BL=[],CI={},MET=[],REC=[],CLI=[];

document.addEventListener('DOMContentLoaded',()=>loadAll());

async function nq(db,sorts=[]){
  const b={page_size:100};if(sorts.length)b.sorts=sorts;
  const r=await fetch(`${PROXY}/v1/databases/${db}/query`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});
  if(!r.ok)throw new Error(r.status);return r.json();
}
function gt(p){for(const k of Object.keys(p.properties||{})){if(p.properties[k].type==='title')return p.properties[k].title?.[0]?.plain_text||'—'}return '—'}
function gp(p,k,t='text'){const v=p.properties?.[k];if(!v)return null;
  if(t==='text')return v.rich_text?.[0]?.plain_text||v.title?.[0]?.plain_text||null;
  if(t==='select')return v.select?.name||null;
  if(t==='number')return v.number??null;
  if(t==='date')return v.date?.start||null;
  if(t==='url')return v.url||null;
  if(t==='relation'){const rel=v.relation||[];return rel.map(r=>(r.id||'').replace(/-/g,''));}
  if(t==='checkbox')return v.checkbox??false;
  return null}
function fd(s,short=false){if(!s)return '—';const d=new Date(s);if(isNaN(d))return s;return d.toLocaleDateString('fr-FR',short?{day:'2-digit',month:'short'}:{day:'numeric',month:'long',year:'numeric'})}

async function loadAll(){
  try{
    const[jr,sr,tr,nr,br,mr,rr,cr]=await Promise.all([
      nq(DB_J,[{property:'Nom complet',direction:'ascending'}]),
      nq(DB_S,[{property:'Date',direction:'descending'}]),
      nq(DB_T,[{property:'Date',direction:'descending'}]),
      nq(DB_N,[{property:'Date',direction:'descending'}]),
      nq(DB_B,[{property:'Date',direction:'descending'}]),
      nq(DB_MET,[{property:'Date',direction:'descending'}]),
      nq(DB_REC,[]),
      nq(DB_CLI,[{property:'Date',direction:'descending'}]),
    ]);
    const all=jr.results||[];
    J=JID?all.find(x=>x.id===JID)||all[0]:all[0];
    if(!J)throw new Error('no joueur');
    const jid_nd=J.id.replace(/-/g,'');
    const flt=arr=>arr.filter(x=>{
      const r=gp(x,'Joueur','relation')||[];
      return r.some(id=>id===jid_nd);
    });
    ST=flt(sr.results||[]);TS=flt(tr.results||[]);NU=flt(nr.results||[]);BL=flt(br.results||[]);
    MET=flt(mr.results||[]);
    CLI=flt(cr.results||[]);
    REC=rr.results||[]; // Recettes globales — pas de filtre joueur
    hero();renderOverview();
    document.getElementById('sync-info').textContent='Notion · '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  }catch(e){console.warn('démo',e);demo()}
}

  const poste=gp(J,'Poste','select')||'Excentré';
  const norme=NORMES[poste]||NORMES['Excentré'];
  const lastT=tS[0];

  const normCard=(label,val,ref,unit)=>{
    if(val===null)return `<div class="lcard" style="padding:12px 14px"><div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px"><span style="font-family:'Syne',sans-serif;font-size:8px;letter-spacing:.13em;text-transform:uppercase;color:var(--ov-dim);font-weight:700">${label}</span><span class="badge badge-warn">—</span></div><div style="font-size:11px;color:var(--txt-d);font-style:italic">Non testé</div></div>`;
    const pct=Math.min(100,Math.round(val/ref*100));
    const cls=pct>=100?'norme-ok':pct>=85?'norme-warn':'norme-nope';
    const bcls=pct>=100?'badge-ok':pct>=85?'badge-warn':'badge-nope';
    const blabel=pct>=100?'Norme ✓':pct>=85?'Proche':'Sous norme';
    return `<div class="lcard" style="padding:12px 14px">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px">
        <span style="font-family:'Syne',sans-serif;font-size:8px;letter-spacing:.13em;text-transform:uppercase;color:var(--ov-dim);font-weight:700">${label}</span>
        <div style="display:flex;align-items:baseline;gap:4px"><span style="font-family:'Bebas Neue',serif;font-size:22px;color:var(--ov-txt)">${val.toFixed(1)}</span><span style="font-size:9px;color:var(--ov-dim)">${unit} / réf ${ref}</span></div>
      </div>
      <div style="height:4px;background:#f0ede8;border-radius:4px;overflow:hidden;margin-bottom:5px"><div class="norme-fill ${cls}" style="width:${pct}%"></div></div>
      <span class="badge ${bcls}">${blabel}</span>
    </div>`;
  };

  const el=document.getElementById('s-perf');
  el.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="lst" style="margin-bottom:0;flex:1">Tests — ${poste}</div>
      <select class="lsel" onchange="renderPerf(this.value)">${sOpts||`<option>${saisonFilter}</option>`}</select>
    </div>

    <!-- Normes poste -->
    <div class="lst mb">Benchmarks niveau élite</div>
    ${lastT?`
    <div class="g2 mb2">
      ${normCard('Vmax',gp(lastT,'Vmax','number'),norme.vmax,'km/h')}
      ${normCard('CMJ',gp(lastT,'CMJ (cm)','number'),norme.cmj,'cm')}
      ${normCard('SJ',gp(lastT,'SJ (cm)','number'),norme.sj,'cm')}
      ${normCard('VMA',gp(lastT,'VMA (km/h)','number'),norme.vma,'km/h')}
    </div>
    `:`<div class="lempty mb2">Aucun test enregistré pour cette saison.</div>`}

    <!-- Profil mécanique -->
    <div class="lst mb">Profil biomécanique</div>
    <div class="g2 mb2">
      <div class="lcard">
        <div class="lcard-h" style="padding:10px 14px;border-bottom:1px solid var(--ov-bdr);background:#f8f7f4"><span style="font-family:'Syne',sans-serif;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--ov-dim);font-weight:700">Motricité</div>
        <div style="font-family:'Bebas Neue',serif;font-size:22px;color:var(--ov-txt);margin-bottom:4px;padding:14px 14px 0">${gp(J,'Motricité','select')||'—'}</div>
        <div style="font-size:11px;color:var(--ov-muted);font-weight:300;line-height:1.5;padding:0 14px 14px">${gp(J,'Motricité','select')==='Extension'?'Système puissance / explosivité extension':'Système vitesse / explosivité flexion'}</div>
      </div>
      <div class="lcard">
        <div class="lcard-h" style="padding:10px 14px;border-bottom:1px solid var(--ov-bdr);background:#f8f7f4"><span style="font-family:'Syne',sans-serif;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--ov-dim);font-weight:700">Fibres dominantes</div>
        <div style="font-family:'Bebas Neue',serif;font-size:22px;color:var(--ov-txt);margin-bottom:4px;padding:14px 14px 0">${gp(J,'Fibres','select')||'—'}</div>
        <div style="font-size:11px;color:var(--ov-muted);font-weight:300;line-height:1.5;padding:0 14px 14px">${{'Rapides':'Pic de puissance court — explosivité max','Lentes':'Endurance effort — maintien long','Hybrides':'Équilibre puissance/endurance','Indéterminées':'Profil à affiner'}[gp(J,'Fibres','select')]||'—'}</div>
      </div>
      <div class="lcard">
        <div class="lcard-h" style="padding:10px 14px;border-bottom:1px solid var(--ov-bdr);background:#f8f7f4"><span style="font-family:'Syne',sans-serif;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--ov-dim);font-weight:700">Réflexes archaïques</div>
        <div style="font-family:'Bebas Neue',serif;font-size:22px;color:var(--ov-txt);margin-bottom:4px;padding:14px 14px 0">${gp(J,'Score réflexes','number')!==null?gp(J,'Score réflexes','number')+' / 60':'—'}</div>
        <div style="font-size:11px;color:var(--ov-muted);font-weight:300;line-height:1.5;padding:0 14px 14px">Profil : ${gp(J,'Profil réflexes','select')||'—'}</div>

      <div class="lcard">
        <div class="lcard-h" style="padding:10px 14px;border-bottom:1px solid var(--ov-bdr);background:#f8f7f4"><span style="font-family:'Syne',sans-serif;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--ov-dim);font-weight:700">Poids / Taille</div>
        <div style="font-family:'Bebas Neue',serif;font-size:22px;color:var(--ov-txt);margin-bottom:4px;padding:14px 14px 0">${gp(J,'Poids (kg)','number')||'—'} kg</div>
        <div style="font-size:11px;color:var(--ov-muted);font-weight:300;line-height:1.5;padding:0 14px 14px">${gp(J,'Taille (cm)','number')||'—'} cm</div>
      </div>
    </div>

    <!-- Évolution tests -->
    ${tS.length>=2?`
    <div class="lst mb">Évolution</div>

      <div class="lcard-p" style="padding:14px 16px 10px">

    <!-- Tous les tests -->

    ${tS.length?tS.map(t=>{
      const cmj=gp(t,'CMJ (cm)','number'),sj=gp(t,'SJ (cm)','number'),vma=gp(t,'VMA (km/h)','number');

      return `<div class="lcard mb">

            <div><div class="mstat-v" style="color:var(--ov-txt)">${vmx?vmx.toFixed(1):'—'}</div><div class="mstat-l" style="color:var(--ov-dim)">Vmax</div></div>

          </div>
          ${gp(t,'Notes','text')?`<div style="margin-top:10px;font-size:11px;color:var(--txt-m);font-style:italic;line-height:1.5;padding-top:10px;border-top:1px solid var(--bdr)">${gp(t,'Notes','text')}</div>`:''}
        </div>
      </div>`;
    }).join(''):`<div class="lempty">Aucun test cette saison.</div>`}`;

  // Chart perf
  if(tS.length>=2){
    setTimeout(()=>{
      const ctx=document.getElementById('chart-perf');
      if(!ctx)return;
      if(CI.perf)CI.perf.destroy();
      const ordered=[...tS].reverse();
      const labels=ordered.map(t=>fd(gp(t,'Date','date'),true));
      CI.perf=new Chart(ctx,{
        type:'line',
        data:{labels,datasets:[
          {label:'CMJ',data:ordered.map(t=>gp(t,'CMJ (cm)','number')),borderColor:'#DA291C',backgroundColor:'rgba(218,41,28,.08)',tension:.4,fill:true,pointRadius:4},

          y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#9a907e',font:{size:9}},border:{display:false}},
          x:{grid:{display:false},ticks:{color:'#9a907e',font:{size:9}},border:{display:false}}
        }}
      });
    },100);
  }
}

      <div class="lcard-h" style="cursor:pointer" onclick="document.getElementById('\${id}').style.display=document.getElementById('\${id}').style.display==='none'?'block':'none'">
        <div>
          <span class="lcard-ht">\${nom}</span>

        </div>

          \${cal?\`<span style="font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:var(--ov-txt)">\${cal} kcal</span>\`:''}

/* ══ SANTÉ ══ */
function renderSante(saisonFilter,typeFilter,zoneFilter){
  const saisons=[...new Set(BL.map(b=>gp(b,'Saison','select')).filter(Boolean))].sort().reverse();
  if(!saisonFilter) saisonFilter='all';
  let bFilt=BL;
  if(saisonFilter!=='all') bFilt=bFilt.filter(b=>gp(b,'Saison','select')===saisonFilter);
  if(typeFilter&&typeFilter!=='all') bFilt=bFilt.filter(b=>gp(b,'Type','select')===typeFilter);
  if(zoneFilter&&zoneFilter!=='all') bFilt=bFilt.filter(b=>gp(b,'Zone/ Localité','select')===zoneFilter);

  const today=new Date();today.setHours(0,0,0,0);
  const blessureActive=BL.find(b=>{const s=gp(b,'Statut','select')||'';return s.includes('En cours')||s.includes('rééducation');});
  let joursSans=null;
  if(blessureActive){
    const debut=gp(blessureActive,'Date','date');
    joursSans=debut?-Math.max(0,Math.floor((today-new Date(debut))/(1000*60*60*24))):-1;
  } else {
    const sorted=BL.filter(b=>gp(b,'Date de reprise entrainement','date')).sort((a,b2)=>gp(b2,'Date de reprise entrainement','date').localeCompare(gp(a,'Date de reprise entrainement','date')));
    const lastReprise=sorted[0]?gp(sorted[0],'Date de reprise entrainement','date'):null;
    if(lastReprise) joursSans=Math.max(0,Math.floor((today-new Date(lastReprise))/(1000*60*60*24)));
  }

  const calcDuree=b=>{const d=gp(b,'Date','date'),r=gp(b,'Date de reprise entrainement','date')||gp(b,'Date de retour match','date');if(!d)return null;const end=r?new Date(r):new Date();return Math.max(0,Math.floor((end-new Date(d))/(1000*60*60*24)));};
  const nTotal=bFilt.length;
  const durees=bFilt.filter(b=>calcDuree(b)).map(b=>calcDuree(b));
  const dureeMoy=durees.length?Math.round(durees.reduce((a,v)=>a+v,0)/durees.length):0;
  const nRecidives=bFilt.filter(b=>gp(b,'Rechute','checkbox')).length;
  const parZone={};bFilt.forEach(b=>{const z=gp(b,'Zone/ Localité','select')||'Autre';parZone[z]=(parZone[z]||0)+1;});
  const parType={};bFilt.forEach(b=>{const t=gp(b,'Type','select')||'Autre';parType[t]=(parType[t]||0)+1;});
  const parSaison={};BL.forEach(b=>{const s=gp(b,'Saison','select')||'?';parSaison[s]=(parSaison[s]||0)+1;});
  const types=[...new Set(BL.map(b=>gp(b,'Type','select')).filter(Boolean))];
  const zones=[...new Set(BL.map(b=>gp(b,'Zone/ Localité','select')).filter(Boolean))];
  const sOpts=['all',...saisons].map(s=>`<option value="${s}" ${s===saisonFilter?'selected':''}>${s==='all'?'Toutes saisons':s}</option>`).join('');
  const tOpts=['all',...types].map(t=>`<option value="${t}" ${t===(typeFilter||'all')?'selected':''}>${t==='all'?'Tous types':t}</option>`).join('');
  const zOpts=['all',...zones].map(z=>`<option value="${z}" ${z===(zoneFilter||'all')?'selected':''}>${z==='all'?'Toutes zones':z}</option>`).join('');
  const zColors=['#e57373','#ffb74d','#64b5f6','#81c784','#ba68c8','#4db6ac','#ff8a65'];
  const gravColors={'🔴 Sévère':'#e57373','🟢 Légère':'#4caf7d','🟡 Modéré':'#ffb74d'};

  document.getElementById('s-sante').innerHTML=`
    <!-- Filtres -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">
      <select class="lsel" onchange="renderSante(this.value,'${typeFilter||'all'}','${zoneFilter||'all'}')">${sOpts}</select>
      <select class="lsel" onchange="renderSante('${saisonFilter}',this.value,'${zoneFilter||'all'}')">${tOpts}</select>
      <select class="lsel" onchange="renderSante('${saisonFilter}','${typeFilter||'all'}',this.value)">${zOpts}</select>
    </div>

    <!-- KPIs -->
    <div class="g2 mb2">
      <div class="lkpi">
        <div class="lkpi-v" style="color:${joursSans===null?'#9a907e':joursSans<0?'#e57373':joursSans>90?'#4caf7d':joursSans>30?'#ffb74d':'#e57373'}">${joursSans===null?'—':Math.abs(joursSans)}</div>

      </div>
      <div class="lkpi">

      </div>
      <div class="lkpi">

        <div class="lkpi-l">Durée moy.</div>
      </div>
      <div class="lkpi">
        <div class="lkpi-v" style="color:${nRecidives>0?'#e57373':'#4caf7d'}">${nRecidives}</div>
        <div class="lkpi-l">Récidives</div>
      </div>
    </div>

    <!-- Zones à risque -->
    ${Object.keys(parZone).length?`
    <div class="lst mb">Zones à surveiller</div>
    <div class="lcard mb2">
      <div class="lcard-p">
        ${Object.entries(parZone).sort((a,b2)=>b2[1]-a[1]).map(([z,n],i)=>`
          <div class="lrow">

            </div>
          </div>`).join('')}
      </div>
    </div>`:''}

    <!-- Blessures par saison -->
    ${Object.keys(parSaison).length?`
    <div class="lst mb">Par saison</div>
    <div class="lcard mb2">
      <div class="lcard-p">
        ${Object.entries(parSaison).sort((a,b2)=>b2[0].localeCompare(a[0])).map(([s,n])=>`
          <div class="lrow">
            <span style="font-size:12px;color:var(--ov-muted)">${s}</span>
            <div style="display:flex;align-items:center;gap:8px">
              <div style="height:3px;width:60px;background:#f0ede8;border-radius:3px;overflow:hidden"><div style="height:100%;width:${Math.round(n/Math.max(...Object.values(parSaison))*100)}%;background:var(--c2,#DA291C);border-radius:3px"></div></div>
              <span style="font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--ov-txt)">${n}</span>
            </div>
          </div>`).join('')}
      </div>
    </div>`:''}

    <!-- Détail blessures -->
    <div class="lst mb">Détail</div>
    ${bFilt.length?bFilt.map(b=>{
      const zone=gp(b,'Zone/ Localité','select')||'—',type=gp(b,'Type','select')||'—';
      const debut=gp(b,'Date','date'),retour=gp(b,'Date de retour match','date'),reprise=gp(b,'Date de reprise entrainement','date');
      const duree=calcDuree(b),grav=gp(b,'Gravité','select')||'—',statut=gp(b,'Statut','select')||'—';
      const rechute=gp(b,'Rechute','checkbox');
      const gCol=gravColors[grav]||'#9a907e';
      return `<div class="bcard">
        <div class="bcard-h">
          <span style="font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--ov-txt)">${zone} — ${type}</span>
          <span style="font-size:9px;padding:2px 8px;border-radius:20px;background:${gCol}18;color:${gCol};font-family:'Syne',sans-serif;font-weight:700">${grav.replace('🔴 ','').replace('🟢 ','').replace('🟡 ','')}</span>
        </div>
        <div class="bcard-b">
          <div class="bcard-grid">
            <div><div class="bstat-l">Début</div><div class="bstat-v">${debut?new Date(debut).toLocaleDateString('fr-FR'):'—'}</div></div>
            <div><div class="bstat-l">Reprise terrain</div><div class="bstat-v">${reprise?new Date(reprise).toLocaleDateString('fr-FR'):'En cours'}</div></div>
            <div><div class="bstat-l">Retour match</div><div class="bstat-v">${retour?new Date(retour).toLocaleDateString('fr-FR'):'—'}</div></div>
            <div><div class="bstat-l">Durée</div><div class="bstat-v" style="color:${duree>28?'#e57373':duree>7?'#ffb74d':'#4caf7d'}">${duree?duree+'j':'—'}</div></div>
          </div>
          <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
            <span class="tag ${statut.includes('Terminé')?'tag-v':statut.includes('cours')?'tag-d':'tag-w'}">${statut.replace('🔄 ','').replace('🟢 ','').replace('🟡 ','')}</span>
            ${rechute?`<span class="tag tag-d">Récidive</span>`:''}
          </div>
        </div>
      </div>`;
    }).join(''):`<div class="lempty">Aucune blessure enregistrée${saisonFilter!=='all'?' pour cette saison':''}.${saisonFilter!=='all'?' Essayez "Toutes saisons".':''}</div>`}`;
}

/* ══ NAV ══ */
function sw(name,el){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-t').forEach(t=>t.classList.remove('active'));
  document.getElementById('s-'+name).classList.add('active');
  el.classList.add('active');
  const rendered={'matchs':renderMatchs,'perf':renderPerf,'nutrition':renderNutrition,'sante':renderSante};
  if(rendered[name]&&!el.dataset.rendered){el.dataset.rendered='1';rendered[name]();}
  if(name==='sante') renderSante(); // toujours rafraîchir (filtres)
}
